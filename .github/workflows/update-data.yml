

name: Update Data

on:
  schedule:
    # 每小时运行一次
    - cron: '0 * * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Create data directory
        run: mkdir -p data
        
      - name: Update FCL Release
        run: |
          curl -s https://api.github.com/repos/FCL-Team/FoldCraftLauncher/releases/latest > data/fcl-release.json
          
      - name: Update ZalithLauncher2 Release
        run: |
          curl -s https://api.github.com/repos/ZalithLauncher/ZalithLauncher2/releases/latest > data/zalith-release.json
          
      - name: Update MobileGlues Release
        run: |
          curl -s https://api.github.com/repos/MobileGlues/MobileGlues/releases/latest > data/mobileglues-release.json
          
      - name: Update JRE Release
        run: |
          curl -s https://api.github.com/repos/MCMrARM/arm64-v8a/releases/latest > data/jre-release.json
          
      - name: Update FCL Actions
        run: |
          curl -s "https://api.github.com/repos/FCL-Team/FoldCraftLauncher/actions/runs?per_page=1" > data/fcl-actions.json
          RUN_ID=$(jq -r '.workflow_runs[0].id' data/fcl-actions.json)
          curl -s "https://api.github.com/repos/FCL-Team/FoldCraftLauncher/actions/runs/$RUN_ID/artifacts" > data/fcl-artifacts.json
          # 合并为 fcl-action.json
          echo "{ \"run\": $(cat data/fcl-actions.json | jq '.workflow_runs[0]'), \"artifacts\": $(cat data/fcl-artifacts.json | jq '.artifacts') }" > data/fcl-action.json
          
      - name: Update ZalithLauncher2 Actions
        run: |
          curl -s "https://api.github.com/repos/ZalithLauncher/ZalithLauncher2/actions/runs?per_page=1" > data/zalith-actions.json
          RUN_ID=$(jq -r '.workflow_runs[0].id' data/zalith-actions.json)
          curl -s "https://api.github.com/repos/ZalithLauncher/ZalithLauncher2/actions/runs/$RUN_ID/artifacts" > data/zalith-artifacts.json
          # 合并为 zalith-action.json
          echo "{ \"run\": $(cat data/zalith-actions.json | jq '.workflow_runs[0]'), \"artifacts\": $(cat data/zalith-artifacts.json | jq '.artifacts') }" > data/zalith-action.json
          
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update data [skip ci]"
          git push

