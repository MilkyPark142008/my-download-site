// ==================== 页面初始化 ====================
document.addEventListener('DOMContentLoaded', function() {
    const mirrorSelect = document.getElementById('mirrorSelect');
    const projectSelect = document.getElementById('projectSelect');
    
    if (mirrorSelect) {
        mirrorSelect.addEventListener('change', updateAllDownloadButtons);
    }
    
    if (projectSelect) {
        projectSelect.addEventListener('change', function() {
            switchModule(this.value);
        });
    }
    
    document.addEventListener('click', function(e) {
        const menu = document.getElementById('sideMenu');
        const toggleBtn = document.getElementById('menuToggle');
        if (menu && toggleBtn && !menu.contains(e.target) && !toggleBtn.contains(e.target) && menu.classList.contains('active')) {
            toggleMenu();
        }
    });
    
    // 绑定各模块的切换按钮事件
    const fclButtons = document.querySelectorAll('#fclModule .selector-btn');
    fclButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            setFclDownloadType(this.getAttribute('data-type'));
        });
    });
    
    const zalithButtons = document.querySelectorAll('#zalithModule .selector-btn');
    zalithButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            setZalithDownloadType(this.getAttribute('data-type'));
        });
    });
    
    const amethystButtons = document.querySelectorAll('#amethystModule .selector-btn');
    amethystButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            setAmethystDownloadType(this.getAttribute('data-type'));
        });
    });
    
    // 加载所有数据
    loadCommitInfo();
    loadFclData();
    loadZalithData();
    loadAmethystData();
    loadMobileGluesData();
});

// 暴露全局函数
window.toggleMenu = toggleMenu;
window.switchModule = switchModule;
window.setFclDownloadType = setFclDownloadType;
window.setZalithDownloadType = setZalithDownloadType;
window.setAmethystDownloadType = setAmethystDownloadType;
    </script>
</body>
</html>