name: Update Site Data

on:
  schedule:
    - cron: '0 * * * *'   # 每小时运行一次
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # === 获取最新 Release 信息 ===
      - name: Fetch FCL latest release
        run: |
          curl -s https://api.github.com/repos/FCL-Team/FoldCraftLauncher/releases/latest > data/fcl.json

      - name: Fetch MobileGlues latest release
        run: |
          curl -s https://api.github.com/repos/MobileGL-Dev/MobileGlues-release/releases/latest > data/mobileglues.json

      - name: Fetch JRE latest release
        run: |
          curl -s https://api.github.com/repos/MilkyPark142008/android-openjdk-build-release/releases/latest > data/jre.json

      # === 生成仓库源码更新时间 ===
      - name: Generate commit info
        run: |
          echo '{' > data/commit-info.json
          echo '  "sha": "'$(git rev-parse --short HEAD)'",' >> data/commit-info.json
          echo '  "date": "'$(git log -1 --format=%ci)'",' >> data/commit-info.json
          echo '  "message": "$(git log -1 --pretty=format:'%s' | sed 's/"/\\\\"/g' | sed 's/\"/\\\\\"/g')"' >> data/commit-info.json
          echo '}' >> data/commit-info.json
          cat data/commit-info.json

      # === 提交和推送 ===
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fcl.json data/mobileglues.json data/jre.json data/commit-info.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: release info and commit data"
          git push