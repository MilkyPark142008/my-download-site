

name: Update Data

on:
  schedule:
    # 每小时运行一次
    - cron: '0 * * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Create data directory
        run: mkdir -p data
        
      - name: Update FCL
        run: |
          curl -s https://api.github.com/repos/FCL-Team/FoldCraftLauncher/releases/latest > data/fcl-release.json
          curl -s "https://api.github.com/repos/FCL-Team/FoldCraftLauncher/actions/runs?per_page=1" > data/fcl-actions.json
          RUN_ID=$(jq -r '.workflow_runs[0].id' data/fcl-actions.json)
          curl -s "https://api.github.com/repos/FCL-Team/FoldCraftLauncher/actions/runs/$RUN_ID/artifacts" > data/fcl-artifacts.json
          # 合并为 fcl.json
          echo "{ \"release\": $(cat data/fcl-release.json), \"action\": { \"run\": $(cat data/fcl-actions.json | jq '.workflow_runs[0]'), \"artifacts\": $(cat data/fcl-artifacts.json | jq '.artifacts') } }" > data/fcl.json
          rm data/fcl-release.json data/fcl-actions.json data/fcl-artifacts.json
          
      - name: Update ZalithLauncher2
        run: |
          curl -s https://api.github.com/repos/ZalithLauncher/ZalithLauncher2/releases/latest > data/zalith-release.json
          curl -s "https://api.github.com/repos/ZalithLauncher/ZalithLauncher2/actions/runs?per_page=1" > data/zalith-actions.json
          RUN_ID=$(jq -r '.workflow_runs[0].id' data/zalith-actions.json)
          curl -s "https://api.github.com/repos/ZalithLauncher/ZalithLauncher2/actions/runs/$RUN_ID/artifacts" > data/zalith-artifacts.json
          # 合并为 zalith.json
          echo "{ \"release\": $(cat data/zalith-release.json), \"action\": { \"run\": $(cat data/zalith-actions.json | jq '.workflow_runs[0]'), \"artifacts\": $(cat data/zalith-artifacts.json | jq '.artifacts') } }" > data/zalith.json
          rm data/zalith-release.json data/zalith-actions.json data/zalith-artifacts.json
          
      - name: Update MobileGlues
        run: |
          curl -s https://api.github.com/repos/MobileGL-Dev/MobileGlues-release/releases/latest > data/mobileglues-release.json
          # MobileGlues 无 Actions，直接重命名
          mv data/mobileglues-release.json data/mobileglues.json
          
      - name: Update JRE
        run: |
          curl -s https://api.github.com/repos/MCMrARM/arm64-v8a/releases/latest > data/jre-release.json
          # JRE 无 Actions，直接重命名
          mv data/jre-release.json data/jre.json
          
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update data [skip ci]"
          git push

