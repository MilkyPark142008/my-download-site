// ==================== 源码提交信息加载 ====================
async function loadCommitInfo() {
    const commitInfoDiv = document.getElementById('commitInfo');
    if (!commitInfoDiv) return;
    
    const cached = localStorage.getItem('cached_commit_info');
    let hasCached = false;
    if (cached) {
        try {
            const data = JSON.parse(cached);
            if (data && data.date) {
                renderCommitInfo(data, commitInfoDiv);
                hasCached = true;
            }
        } catch(e) {}
    }
    
    if (!hasCached) {
        commitInfoDiv.innerHTML = '<div class="loading">加载中...</div>';
    }
    
    try {
        const response = await fetch('/commit-info.json?t=' + Date.now());
        if (!response.ok) throw new Error();
        const data = await response.json();
        
        if (data && data.date) {
            localStorage.setItem('cached_commit_info', JSON.stringify(data));
            localStorage.setItem('last_commit_check', Date.now());
            renderCommitInfo(data, commitInfoDiv);
            
            const commitTime = new Date(data.date).getTime();
            const twoHoursAgo = Date.now() - 2 * 60 * 60 * 1000;
            if (commitTime < twoHoursAgo) {
                updateStatusBar(false, '源码数据可能已过期');
            } else {
                updateStatusBar(true, '源码已同步');
            }
        } else {
            throw new Error('无效数据');
        }
    } catch (error) {
        console.error('加载提交信息失败:', error);
        if (!hasCached) {
            commitInfoDiv.innerHTML = '<p>⚠️ 无法获取更新信息</p><p class="note"><a href="#" onclick="location.reload();return false;" class="refresh-link">点击刷新</a></p>';
        }
        updateStatusBar(null, '无法获取更新信息');
    }
}

function renderCommitInfo(data, container) {
    if (!container) return;
    
    const dateStr = formatDate(data.date);
    const timeAgo = getTimeAgo(data.date);
    const shortSha = data.sha ? data.sha.substring(0, 7) : '未知';
    const shortMsg = data.message ? (data.message.length > 50 ? data.message.substring(0, 50) + '...' : data.message) : '无更新消息';
    
    container.innerHTML = `
        <p>📅 ${dateStr} <span style="color: #1a1a1a; font-weight: 500;">(${timeAgo})</span></p>
        <p class="commit-msg">📝 ${escapeHtml(shortMsg)}</p>
        <p class="commit-sha">🔗 #${escapeHtml(shortSha)}</p>
    `;
}

// ==================== 模块切换 ====================
function switchModule(moduleName) {
    const fclModule = document.getElementById('fclModule');
    const zalithModule = document.getElementById('zalithModule');
    const amethystModule = document.getElementById('amethystModule');
    const mgModule = document.getElementById('mgModule');
    const projectSelect = document.getElementById('projectSelect');
    
    if (fclModule) fclModule.style.display = 'none';
    if (zalithModule) zalithModule.style.display = 'none';
    if (amethystModule) amethystModule.style.display = 'none';
    if (mgModule) mgModule.style.display = 'none';
    
    if (moduleName === 'fcl' && fclModule) {
        fclModule.style.display = 'block';
        if (projectSelect) projectSelect.value = 'fcl';
        if (!fclDataLoaded) loadFclData();
    } else if (moduleName === 'zalith' && zalithModule) {
        zalithModule.style.display = 'block';
        if (projectSelect) projectSelect.value = 'zalith';
        if (!zalithDataLoaded) loadZalithData();
    } else if (moduleName === 'amethyst' && amethystModule) {
        amethystModule.style.display = 'block';
        if (projectSelect) projectSelect.value = 'amethyst';
        if (!amethystDataLoaded) loadAmethystData();
    } else if (moduleName === 'mg' && mgModule) {
        mgModule.style.display = 'block';
        if (projectSelect) projectSelect.value = 'mg';
        if (!mgDataLoaded) loadMobileGluesData();
    }
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

