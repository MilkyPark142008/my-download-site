    <script>
// ==================== 工具函数 ====================
function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function getArchFromFilename(filename) {
    if (!filename) return 'other';
    const lower = filename.toLowerCase();
    if (lower.includes('arm64-v8a') || lower.includes('arm64')) return 'arm64';
    if (lower.includes('armeabi-v7a') || lower.includes('armv7')) return 'armeabi';
    if (lower.includes('x86_64') || lower.includes('x64')) return 'x86_64';
    if (lower.includes('x86') && !lower.includes('x86_64')) return 'x86';
    if (lower.includes('all') || lower.includes('universal')) return 'all';
    return 'other';
}

function getArchName(arch) {
    switch(arch) {
        case 'arm64': return 'ARM64';
        case 'armeabi': return 'ARMv7';
        case 'x86': return 'x86';
        case 'x86_64': return 'x86_64';
        case 'all': return '通用版';
        default: return '其他';
    }
}

function formatSize(bytes) {
    if (!bytes || bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function formatDate(isoString) {
    if (!isoString) return '';
    try {
        const date = new Date(isoString);
        if (isNaN(date.getTime())) return '';
        return date.toLocaleString('zh-CN', { hour12: false });
    } catch(e) {
        return '';
    }
}

function getTimeAgo(dateString) {
    if (!dateString) return '';
    try {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return '';
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);
        
        if (diffMins < 1) return '刚刚更新';
        if (diffMins < 60) return `${diffMins} 分钟前更新`;
        if (diffHours < 24) return `${diffHours} 小时前更新`;
        return `${diffDays} 天前更新`;
    } catch(e) {
        return '';
    }
}

// ==================== 渲染函数 ====================
function renderReleaseCards(assets, mirrorPrefix, groupByArch = true) {
    if (!assets || assets.length === 0) {
        return '<div class="no-assets">暂无可用下载文件</div>';
    }
    
    if (groupByArch) {
        const archMap = new Map();
        assets.forEach(asset => {
            if (asset && asset.name) {
                const arch = getArchFromFilename(asset.name);
                if (!archMap.has(arch)) archMap.set(arch, asset);
            }
        });
        const archOrder = ['arm64', 'armeabi', 'x86_64', 'x86', 'all', 'other'];
        const sortedArchs = Array.from(archMap.keys()).sort((a, b) => archOrder.indexOf(a) - archOrder.indexOf(b));
        
        let cardsHtml = '';
        sortedArchs.forEach(arch => {
            const asset = archMap.get(arch);
            if (!asset) return;
            const archName = getArchName(arch);
            const sizeFormatted = formatSize(asset.size);
            const originalUrl = asset.browser_download_url;
            if (!originalUrl) return;
            cardsHtml += `
                <div class="download-item">
                    <div class="item-title">${escapeHtml(archName)}</div>
                    <div class="item-details">
                        <span>${escapeHtml(asset.name)}</span>
                        <span>${sizeFormatted}</span>
                    </div>
                    <a href="${mirrorPrefix}${originalUrl}" class="download-btn" target="_blank" rel="noopener noreferrer" data-original-url="${originalUrl}">下载</a>
                </div>
            `;
        });
        return cardsHtml || '<div class="no-assets">暂无可用下载文件</div>';
    } else {
        let cardsHtml = '';
        assets.forEach(asset => {
            if (!asset || !asset.browser_download_url) return;
            const sizeFormatted = formatSize(asset.size);
            const originalUrl = asset.browser_download_url;
            cardsHtml += `
                <div class="download-item">
                    <div class="item-title">${escapeHtml(asset.name)}</div>
                    <div class="item-details">
                        <span>${sizeFormatted}</span>
                    </div>
                    <a href="${mirrorPrefix}${originalUrl}" class="download-btn" target="_blank" rel="noopener noreferrer" data-original-url="${originalUrl}">下载</a>
                </div>
            `;
        });
        return cardsHtml || '<div class="no-assets">暂无可用下载文件</div>';
    }
}

