name: Update Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch FCL latest release
        run: curl -s https://api.github.com/repos/FCL-Team/FoldCraftLauncher/releases/latest > data/fcl.json

      - name: Fetch MobileGlues latest release
        run: curl -s https://api.github.com/repos/MobileGL-Dev/MobileGlues-release/releases/latest > data/mobileglues.json

      - name: Fetch JRE latest release
        run: curl -s https://api.github.com/repos/MilkyPark142008/android-openjdk-build-release/releases/latest > data/jre.json

      - name: Generate commit info
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(git log -1 --format=%ci)
          MESSAGE=$(git log -1 --pretty=format:'%s' | tr -d '\n' | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')
          echo "{\"sha\":\"$SHA\",\"date\":\"$DATE\",\"message\":\"$MESSAGE\"}" | jq '.' > data/commit-info.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fcl.json data/mobileglues.json data/jre.json data/commit-info.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: release info and commit data"
          git push