// ==================== 状态栏 ====================
function updateStatusBar(isFresh, message) {
    const statusBar = document.getElementById('statusBar');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    
    if (!statusBar || !statusDot || !statusText) return;
    
    statusBar.style.display = 'flex';
    
    if (isFresh === true) {
        statusDot.className = 'status-dot';
        statusText.textContent = message || '数据已同步';
    } else if (isFresh === false) {
        statusDot.className = 'status-dot warning';
        statusText.textContent = message || '数据可能已过期';
    } else {
        statusDot.className = 'status-dot error';
        statusText.textContent = message || '加载失败';
    }
}

// ==================== FCL 模块 ====================
let fclDataLoaded = false;

async function loadFclData() {
    try {
        const response = await fetch('/fcl.json?t=' + Date.now());
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        
        if (data && data.release) {
            const versionBadge = document.getElementById('fclVersionBadge');
            const updateTime = document.getElementById('fclUpdateTime');
            const changelogContent = document.getElementById('fclChangelogContent');
            
            if (versionBadge) versionBadge.textContent = data.release.tag_name || '未知版本';
            if (updateTime) updateTime.textContent = data.release.published_at ? formatDate(data.release.published_at) : '';
            if (changelogContent) changelogContent.innerHTML = (data.release.body || '暂无更新日志').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            const assets = data.release.assets || [];
            const mirrorPrefix = document.getElementById('mirrorSelect').value;
            const container = document.getElementById('fclReleaseContainer');
            if (container) container.innerHTML = renderReleaseCards(assets, mirrorPrefix, true);
        }
        
        if (data && data.action && data.action.run && data.action.run.id) {
            const runId = data.action.run.id;
            const artifacts = data.action.artifacts || [];
            
            const actionVersionBadge = document.getElementById('fclActionVersionBadge');
            const actionUpdateTime = document.getElementById('fclActionUpdateTime');
            const actionContainer = document.getElementById('fclActionContainer');
            
            if (actionVersionBadge) actionVersionBadge.textContent = '运行 #' + runId;
            if (actionUpdateTime && data.action.run.created_at) actionUpdateTime.textContent = formatDate(data.action.run.created_at);
            
            let html = '<div class="run-info">运行 #' + runId + ' | ' + formatDate(data.action.run.created_at) + '</div>';
            
            if (artifacts.length === 0) {
                html += '<div class="no-assets">暂无构建产物</div>';
            } else {
                artifacts.forEach(artifact => {
                    html += `
                        <div class="download-item">
                            <div class="item-title">${escapeHtml(artifact.name)}</div>
                            <div class="item-details">
                                <span>📦 ${formatSize(artifact.size_in_bytes)}</span>
                            </div>
                            <a href="https://github.com/FCL-Team/FoldCraftLauncher/actions/runs/${runId}" class="download-btn" target="_blank" rel="noopener noreferrer">
                                查看运行记录
                            </a>
                        </div>
                    `;
                });
            }
            if (actionContainer) actionContainer.innerHTML = html;
        } else {
            const actionVersionBadge = document.getElementById('fclActionVersionBadge');
            const actionContainer = document.getElementById('fclActionContainer');
            if (actionVersionBadge) actionVersionBadge.textContent = '暂无';
            if (actionContainer) actionContainer.innerHTML = '<div class="no-assets">暂无 Action 构建记录</div>';
        }
        
        const savedType = localStorage.getItem('fcl_download_type');
        if (savedType === 'action') {
            setFclDownloadType('action');
        } else {
            setFclDownloadType('release');
        }
        
        fclDataLoaded = true;
    } catch (error) {
        console.error('加载 FCL 失败:', error);
        const releaseContainer = document.getElementById('fclReleaseContainer');
        const versionBadge = document.getElementById('fclVersionBadge');
        if (releaseContainer) releaseContainer.innerHTML = '<div class="no-assets">加载失败，请稍后重试</div>';
        if (versionBadge) versionBadge.textContent = '加载失败';
    }
}

function setFclDownloadType(type) {
    const releaseSection = document.getElementById('fclReleaseSection');
    const actionSection = document.getElementById('fclActionSection');
    const buttons = document.querySelectorAll('#fclModule .selector-btn');
    
    buttons.forEach(btn => {
        if (btn.getAttribute('data-type') === type) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
    
    if (releaseSection && actionSection) {
        if (type === 'release') {
            releaseSection.style.display = 'block';
            actionSection.style.display = 'none';
        } else {
            releaseSection.style.display = 'none';
            actionSection.style.display = 'block';
        }
    }
    
    localStorage.setItem('fcl_download_type', type);
}

