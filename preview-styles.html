<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI风格预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; }
        .style-list { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; background: #333; }
        .style-item { cursor: pointer; border-radius: 10px; overflow: hidden; transition: transform 0.3s; width: 280px; }
        .style-item:hover { transform: scale(1.05); }
        .style-preview { height: 200px; display: flex; flex-direction: column; padding: 20px; gap: 10px; }
        .style-name { padding: 15px; text-align: center; font-weight: bold; }
        
        /* 风格1: 极简清爽 */
        .minimal-preview { background: #ffffff; }
        .minimal-preview .h { height: 20px; background: #007AFF; border-radius: 4px; }
        .minimal-preview .b { height: 30px; background: #007AFF; border-radius: 6px; color: white; line-height: 30px; padding: 0 10px; font-size: 12px; }
        .minimal .style-name { background: #f5f5f5; color: #333; }
        
        /* 风格2: 游戏科技 */
        .gaming-preview { background: #1a1a2e; border: 2px solid #00ff88; }
        .gaming-preview .h { height: 20px; background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .gaming-preview .b { height: 30px; background: linear-gradient(45deg, #00ff88, #00cc6a); color: #000; font-weight: bold; }
        .gaming .style-name { background: #16213e; color: #00ff88; }
        
        /* 风格3: 暗黑电竞 */
        .esports-preview { background: #0a0a0a; }
        .esports-preview .h { height: 20px; background: linear-gradient(90deg, #ff006e, #8338ec); }
        .esports-preview .b { height: 30px; background: #ff006e; color: white; box-shadow: 0 0 15px #ff006e; }
        .esports .style-name { background: #1a1a1a; color: #ff006e; }
        
        /* 风格4: 扁平卡片 */
        .card-preview { background: #e8f4f8; }
        .card-preview .h { height: 20px; background: #ff6b6b; border-radius: 10px; }
        .card-preview .b { height: 30px; background: #4ecdc4; border-radius: 15px; color: white; }
        .card .style-name { background: #ffe66d; color: #333; }
        
        /* 风格5: 渐变活力 */
        .gradient-preview { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .gradient-preview .h { height: 20px; background: rgba(255,255,255,0.9); border-radius: 20px; }
        .gradient-preview .b { height: 30px; background: rgba(255,255,255,0.3); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); color: white; border-radius: 20px; }
        .gradient .style-name { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        
        /* 风格6: 像素复古 */
        .pixel-preview { background: #2d2d2d; image-rendering: pixelated; }
        .pixel-preview .h { height: 18px; background: #ffcc00; border: 3px solid #000; }
        .pixel-preview .b { height: 28px; background: #ff6b35; border: 3px solid #000; color: white; font-family: monospace; }
        .pixel .style-name { background: #1a1a1a; color: #ffcc00; font-family: monospace; }
        
        #previewFrame { position: fixed; top: 0; right: 0; width: 60%; height: 100vh; border-left: 3px solid #666; display: none; }
        .instruction { padding: 20px; background: #222; color: #fff; margin: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="instruction">
        <h2>🎨 UI风格选择器</h2>
        <p>点击下方任意风格卡片即可预览详细效果！选择你喜欢的风格后告诉我，我会应用到你的网站。</p>
    </div>
    
    <div class="style-list">
        <div class="style-item minimal" onclick="selectStyle('minimal')">
            <div class="style-preview minimal-preview">
                <div class="h"></div>
                <div class="b"></div>
            </div>
            <div class="style-name">极简清爽风</div>
        </div>
        
        <div class="style-item gaming" onclick="selectStyle('gaming')">
            <div class="style-preview gaming-preview">
                <div class="h"></div>
                <div class="b"></div>
            </div>
            <div class="style-name">游戏科技风</div>
        </div>
        
        <div class="style-item esports" onclick="selectStyle('esports')">
            <div class="style-preview esports-preview">
                <div class="h"></div>
                <div class="b"></div>
            </div>
            <div class="style-name">暗黑电竞风</div>
        </div>
        
        <div class="style-item card" onclick="selectStyle('card')">
            <div class="style-preview card-preview">
                <div class="h"></div>
                <div class="b"></div>
            </div>
            <div class="style-name">扁平卡片风</div>
        </div>
        
        <div class="style-item gradient" onclick="selectStyle('gradient')">
            <div class="style-preview gradient-preview">
                <div class="h"></div>
                <div class="b"></div>
            </div>
            <div class="style-name">渐变活力风</div>
        </div>
        
        <div class="style-item pixel" onclick="selectStyle('pixel')">
            <div class="style-preview pixel-preview">
                <div class="h"></div>
                <div class="b"></div>
            </div>
            <div class="style-name">像素复古风</div>
        </div>
    </div>
    
    <iframe id="previewFrame" src=""></iframe>
    
    <script>
        function selectStyle(style) {
            // 这里可以展开显示更多预览
            alert('你选择了：' + style + '\n\n请告诉我这个选择，我会生成完整的CSS代码应用到你的网站！');
        }
    </script>
</body>
</html>
